<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 450">
  <defs>
    <linearGradient id="bgFili" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0000"/>
      <stop offset="50%" stop-color="#1a0505"/>
      <stop offset="100%" stop-color="#2a0a0a"/>
    </linearGradient>
    <linearGradient id="redBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b1a1a"/>
      <stop offset="50%" stop-color="#a52a2a"/>
      <stop offset="100%" stop-color="#6b1010"/>
    </linearGradient>
    <filter id="noiseFili">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>

  <rect width="300" height="450" fill="url(#bgFili)" rx="3"/>
  <rect x="4" y="4" width="292" height="442" fill="none" stroke="#8b1a1a" stroke-width="2" rx="2"/>
  <rect x="7" y="7" width="286" height="436" fill="none" stroke="#c9a84c" stroke-width="0.5" rx="1"/>

  <!-- Ornamental top border -->
  <rect x="25" y="20" width="250" height="1" fill="#c9a84c" opacity="0.4"/>
  <path d="M25,25 L25,20 L30,20" fill="none" stroke="#8b1a1a" stroke-width="2"/>
  <path d="M275,25 L275,20 L270,20" fill="none" stroke="#8b1a1a" stroke-width="2"/>

  <!-- Central emblem - crossed sword and pen -->
  <g transform="translate(150,130)" opacity="0.35">
    <!-- Sword -->
    <line x1="0" y1="-30" x2="0" y2="30" stroke="#c9a84c" stroke-width="2"/>
    <line x1="-15" y1="-20" x2="15" y2="-20" stroke="#c9a84c" stroke-width="1.5"/>
    <circle cx="0" cy="-30" r="5" fill="none" stroke="#c9a84c" stroke-width="1.5"/>
    <!-- Pen -->
    <line x1="-20" y1="-25" x2="20" y2="25" stroke="#c9a84c" stroke-width="1.5" transform="rotate(30)"/>
  </g>

  <!-- Title -->
  <text x="150" y="240" text-anchor="middle" fill="#c9a84c" font-family="Georgia, serif" font-size="21" font-weight="bold" letter-spacing="2">EL</text>
  <text x="150" y="268" text-anchor="middle" fill="#c9a84c" font-family="Georgia, serif" font-size="21" font-weight="bold" letter-spacing="2">FILIBUSTERISMO</text>

  <!-- Decorative line -->
  <rect x="60" y="285" width="180" height="1" fill="#c9a84c" opacity="0.5"/>
  <circle cx="150" cy="285" r="3" fill="#8b1a1a"/>
  <circle cx="150" cy="285" r="1.5" fill="#c9a84c"/>

  <!-- Author -->
  <text x="150" y="310" text-anchor="middle" fill="#c9a84c" font-family="Georgia, serif" font-size="11" font-style="italic" letter-spacing="1">Dr. Jose Rizal</text>

  <!-- Year -->
  <text x="150" y="335" text-anchor="middle" fill="#8a6e1f" font-family="Georgia, serif" font-size="10" letter-spacing="2">1891</text>

  <!-- Flame motifs at bottom -->
  <g opacity="0.3" transform="translate(150,390)">
    <path d="M-8,-8 Q0,-20 8,-8 Q0,-5 -8,-8" fill="#c9a84c" stroke="none"/>
    <path d="M-5,-12 Q0,-25 5,-12" fill="none" stroke="#c9a84c" stroke-width="0.5"/>
  </g>

  <!-- Ornamental bottom border -->
  <rect x="25" y="428" width="250" height="1" fill="#c9a84c" opacity="0.4"/>

  <!-- Texture overlay -->
  <rect width="300" height="450" fill="#704214" opacity="0.04" filter="url(#noiseFili)"/>

  <!-- Tagalog subtitle -->
  <text x="150" y="365" text-anchor="middle" fill="#c9a84c/30" font-family="Georgia, serif" font-size="8" letter-spacing="1">Ang Paghahari ng Kasakiman</text>
</svg>
