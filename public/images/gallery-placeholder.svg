<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <filter id="noiseG">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>

  <rect width="400" height="300" fill="#2c1810"/>

  <!-- Decorative frame -->
  <rect x="15" y="15" width="370" height="270" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.3"/>
  <rect x="20" y="20" width="360" height="260" fill="none" stroke="#c9a84c" stroke-width="0.5" opacity="0.15"/>

  <!-- Corner ornaments -->
  <path d="M20,30 L20,20 L30,20" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.4"/>
  <path d="M380,30 L380,20 L370,20" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.4"/>
  <path d="M20,270 L20,280 L30,280" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.4"/>
  <path d="M380,270 L380,280 L370,280" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.4"/>

  <!-- Center motif -->
  <circle cx="200" cy="130" r="40" fill="none" stroke="#c9a84c" stroke-width="0.5" opacity="0.2"/>
  <circle cx="200" cy="130" r="25" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.15"/>
  <text x="200" y="142" text-anchor="middle" fill="#c9a84c" font-size="30" opacity="0.3">🖼️</text>

  <!-- Horizontal lines -->
  <line x1="100" y1="200" x2="300" y2="200" stroke="#c9a84c" stroke-width="0.5" opacity="0.15"/>
  <line x1="120" y1="215" x2="280" y2="215" stroke="#c9a84c" stroke-width="0.5" opacity="0.1"/>
  <line x1="140" y1="230" x2="260" y2="230" stroke="#c9a84c" stroke-width="0.5" opacity="0.08"/>

  <!-- Texture -->
  <rect width="400" height="300" fill="#704214" opacity="0.05" filter="url(#noiseG)"/>

  <!-- Label -->
  <text x="200" y="275" text-anchor="middle" fill="#c9a84c" font-family="Georgia, serif" font-size="8" letter-spacing="2" opacity="0.3">MAKASAYSAYANG LARAWAN</text>
</svg>
