<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="skyD" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2a1a"/>
      <stop offset="60%" stop-color="#2a3a2a"/>
      <stop offset="100%" stop-color="#3a4a3a"/>
    </linearGradient>
    <filter id="noiseD">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>

  <rect width="400" height="300" fill="url(#skyD)"/>

  <!-- Mountains -->
  <path d="M0,200 L60,100 L120,170 L180,80 L240,160 L300,90 L400,200 Z" fill="#1a2a1a" opacity="0.6"/>
  <path d="M0,220 L80,140 L160,200 L220,120 L300,190 L400,220 Z" fill="#2a3a2a" opacity="0.5"/>

  <!-- Sea -->
  <rect x="0" y="200" width="400" height="50" fill="#1a2a3a" opacity="0.4"/>

  <!-- Beach/ground -->
  <rect x="0" y="240" width="400" height="60" fill="#3c3424" opacity="0.7"/>

  <!-- Nipa hut -->
  <g transform="translate(250,230)" fill="#4a3a2a" opacity="0.7">
    <polygon points="-25,-20 0,-35 25,-20"/>
    <rect x="-22" y="-20" width="44" height="30"/>
    <rect x="-8" y="-10" width="16" height="20" fill="#1a1a1a" opacity="0.5"/>
  </g>

  <!-- Coconut trees -->
  <g transform="translate(100,210)" opacity="0.5">
    <line x1="0" y1="0" x2="0" y2="40" stroke="#2a3a2a" stroke-width="3"/>
    <path d="M-20,-10 Q0,-30 20,-10" fill="none" stroke="#2a4a2a" stroke-width="2"/>
    <path d="M-15,-15 Q0,-35 15,-15" fill="none" stroke="#2a4a2a" stroke-width="2"/>
  </g>

  <g transform="translate(130,215)" opacity="0.4">
    <line x1="0" y1="0" x2="0" y2="35" stroke="#2a3a2a" stroke-width="2.5"/>
    <path d="M-15,-8 Q0,-25 15,-8" fill="none" stroke="#2a4a2a" stroke-width="1.5"/>
  </g>

  <!-- Rizal figure -->
  <g transform="translate(180,238)" fill="#3c2415" opacity="0.6">
    <ellipse cx="0" cy="-10" rx="3.5" ry="4.5"/>
    <rect x="-4" y="-6" width="8" height="14" rx="2"/>
  </g>

  <!-- Stars -->
  <circle cx="50" cy="30" r="0.8" fill="#fff" opacity="0.2"/>
  <circle cx="300" cy="25" r="0.6" fill="#fff" opacity="0.15"/>
  <circle cx="350" cy="50" r="0.7" fill="#fff" opacity="0.2"/>
  <circle cx="30" cy="55" r="0.5" fill="#fff" opacity="0.15"/>

  <!-- Texture -->
  <rect width="400" height="300" fill="#704214" opacity="0.03" filter="url(#noiseD)"/>

  <!-- Label -->
  <text x="200" y="290" text-anchor="middle" fill="#c9a84c" font-family="Georgia, serif" font-size="8" letter-spacing="2" opacity="0.4">RIZAL SA DAPITAN, 1892-1896</text>
</svg>
