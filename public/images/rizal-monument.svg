<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1628"/>
      <stop offset="50%" stop-color="#2c2438"/>
      <stop offset="100%" stop-color="#3c3448"/>
    </linearGradient>
    <filter id="noiseM">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>

  <rect width="400" height="300" fill="url(#sky)"/>

  <!-- Stars -->
  <circle cx="50" cy="30" r="1" fill="#fff" opacity="0.3"/>
  <circle cx="120" cy="45" r="0.8" fill="#fff" opacity="0.2"/>
  <circle cx="300" cy="25" r="1.2" fill="#fff" opacity="0.25"/>
  <circle cx="350" cy="55" r="0.6" fill="#fff" opacity="0.2"/>
  <circle cx="80" cy="65" r="0.5" fill="#fff" opacity="0.15"/>
  <circle cx="250" cy="40" r="0.7" fill="#fff" opacity="0.2"/>

  <!-- Ground -->
  <rect x="0" y="240" width="400" height="60" fill="#1a0f0a"/>

  <!-- Monument base -->
  <rect x="120" y="220" width="160" height="25" fill="#5c4a1c" stroke="#c9a84c" stroke-width="0.5"/>
  <rect x="140" y="210" width="120" height="15" fill="#4a3a14" stroke="#c9a84c" stroke-width="0.5"/>

  <!-- Monument pillar -->
  <rect x="185" y="80" width="30" height="135" fill="#3c3424" stroke="#c9a84c" stroke-width="0.5"/>

  <!-- Rizal statue silhouette -->
  <g transform="translate(200,90)" fill="#2c2414" stroke="#c9a84c" stroke-width="0.3">
    <!-- Head -->
    <ellipse cx="0" cy="-25" rx="10" ry="12"/>
    <!-- Body -->
    <path d="M-8,-15 L-10,15 L10,15 L8,-15 Z"/>
    <!-- Cape/coat -->
    <path d="M-10,0 L-20,30 L-15,35 L-8,15 Z"/>
    <path d="M10,0 L20,30 L15,35 L8,15 Z"/>
    <!-- Base plate -->
    <rect x="-15" y="30" width="30" height="5" fill="#c9a84c" opacity="0.5"/>
  </g>

  <!-- Gold accent lines on monument -->
  <line x1="185" y1="120" x2="215" y2="120" stroke="#c9a84c" stroke-width="0.5" opacity="0.5"/>
  <line x1="185" y1="160" x2="215" y2="160" stroke="#c9a84c" stroke-width="0.5" opacity="0.5"/>

  <!-- Side elements - trees -->
  <ellipse cx="70" cy="220" rx="25" ry="35" fill="#1a2a1a" opacity="0.6"/>
  <ellipse cx="330" cy="225" rx="20" ry="30" fill="#1a2a1a" opacity="0.5"/>

  <!-- Subtle texture -->
  <rect width="400" height="300" fill="#704214" opacity="0.03" filter="url(#noiseM)"/>

  <!-- Label -->
  <text x="200" y="285" text-anchor="middle" fill="#c9a84c" font-family="Georgia, serif" font-size="10" letter-spacing="2" opacity="0.7">RIZAL MONUMENT · LUNETA</text>
</svg>
