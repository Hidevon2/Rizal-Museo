<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 450">
  <defs>
    <linearGradient id="bgPoem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5e6c8"/>
      <stop offset="100%" stop-color="#d4c4a0"/>
    </linearGradient>
    <filter id="noisePoem">
      <feTurbulence type="fractalNoise" baseFrequency="0.4" numOctaves="4"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>

  <rect width="300" height="450" fill="url(#bgPoem)" rx="3"/>
  <rect x="5" y="5" width="290" height="440" fill="none" stroke="#3c2415" stroke-width="1.5" rx="2"/>
  <rect x="10" y="10" width="280" height="430" fill="none" stroke="#3c2415" stroke-width="0.5" rx="1"/>

  <!-- Parchment texture -->
  <rect width="300" height="450" fill="#704214" opacity="0.06" filter="url(#noisePoem)"/>

  <!-- Ornamental top -->
  <path d="M120,30 Q150,20 180,30" fill="none" stroke="#3c2415" stroke-width="1" opacity="0.4"/>
  <path d="M90,38 Q150,25 210,38" fill="none" stroke="#3c2415" stroke-width="0.5" opacity="0.2"/>

  <!-- Cross motif -->
  <g transform="translate(150,100)" opacity="0.15">
    <line x1="0" y1="-25" x2="0" y2="25" stroke="#3c2415" stroke-width="2"/>
    <line x1="-15" y1="-8" x2="15" y2="-8" stroke="#3c2415" stroke-width="2"/>
  </g>

  <!-- Title -->
  <text x="150" y="170" text-anchor="middle" fill="#3c2415" font-family="Georgia, serif" font-size="18" font-weight="bold" font-style="italic" letter-spacing="1">Mi Ultimo Adios</text>

  <text x="150" y="195" text-anchor="middle" fill="#704214" font-family="Georgia, serif" font-size="9" font-style="italic" letter-spacing="2">Ang Huling Paalam</text>

  <!-- Decorative divider -->
  <rect x="80" y="210" width="140" height="1" fill="#3c2415" opacity="0.3"/>

  <!-- Poem excerpt lines -->
  <g fill="#3c2415" font-family="Georgia, serif" font-size="9" font-style="italic" opacity="0.6">
    <text x="150" y="240" text-anchor="middle">&ldquo;Paalam, sa iyo na aking</text>
    <text x="150" y="255" text-anchor="middle">tinubuang lupa...</text>
    <text x="150" y="275" text-anchor="middle">Kung sa akin ay may公积</text>
    <text x="150" y="290" text-anchor="middle">na natatanaw na liwanag...</text>
    <text x="150" y="310" text-anchor="middle">sa iyong pag-ahon,</text>
    <text x="150" y="325" text-anchor="middle">huwag mong kalimutan&rdquo;</text>
  </g>

  <!-- Bottom divider -->
  <rect x="80" y="355" width="140" height="1" fill="#3c2415" opacity="0.3"/>

  <!-- Year -->
  <text x="150" y="380" text-anchor="middle" fill="#704214" font-family="Georgia, serif" font-size="11" letter-spacing="2">1896</text>

  <!-- Small decorative element at bottom -->
  <path d="M130,410 L150,400 L170,410" fill="none" stroke="#3c2415" stroke-width="0.5" opacity="0.3"/>
  <path d="M135,415 L150,407 L165,415" fill="none" stroke="#3c2415" stroke-width="0.5" opacity="0.2"/>
</svg>
