<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 450">
  <defs>
    <linearGradient id="bgNoli" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="goldBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="50%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#8a6e1f"/>
    </linearGradient>
    <filter id="noise2">
      <feTurbulence type="fractalNoise" baseFrequency="0.5" numOctaves="3"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>

  <rect width="300" height="450" fill="url(#bgNoli)" rx="3"/>
  <rect x="4" y="4" width="292" height="442" fill="none" stroke="url(#goldBar)" stroke-width="1.5" rx="2"/>

  <!-- Ornamental top border -->
  <rect x="20" y="20" width="260" height="2" fill="url(#goldBar)"/>
  <rect x="20" y="25" width="260" height="1" fill="url(#goldBar)" opacity="0.5"/>

  <!-- Decorative corner elements -->
  <path d="M20,30 L20,20 L30,20" fill="none" stroke="#c9a84c" stroke-width="2"/>
  <path d="M280,30 L280,20 L270,20" fill="none" stroke="#c9a84c" stroke-width="2"/>

  <!-- Central sun motif -->
  <circle cx="150" cy="140" r="50" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.3"/>
  <circle cx="150" cy="140" r="35" fill="none" stroke="#c9a84c" stroke-width="0.5" opacity="0.2"/>
  <text x="150" y="155" text-anchor="middle" fill="#c9a84c" font-size="40" opacity="0.4">☀️</text>

  <!-- Title -->
  <text x="150" y="250" text-anchor="middle" fill="#d4af37" font-family="Georgia, serif" font-size="22" font-weight="bold" letter-spacing="2">NOLI ME</text>
  <text x="150" y="278" text-anchor="middle" fill="#d4af37" font-family="Georgia, serif" font-size="22" font-weight="bold" letter-spacing="2">TANGERE</text>

  <!-- Decorative line under title -->
  <rect x="80" y="295" width="140" height="1" fill="url(#goldBar)"/>
  <circle cx="150" cy="295" r="3" fill="#c9a84c"/>

  <!-- Author -->
  <text x="150" y="320" text-anchor="middle" fill="#c9a84c" font-family="Georgia, serif" font-size="11" font-style="italic" letter-spacing="1">Dr. Jose Rizal</text>

  <!-- Year -->
  <text x="150" y="345" text-anchor="middle" fill="#8a6e1f" font-family="Georgia, serif" font-size="10" letter-spacing="2">1887</text>

  <!-- Ornamental bottom border -->
  <path d="M20,420 L20,430 L30,430" fill="none" stroke="#c9a84c" stroke-width="2"/>
  <path d="M280,420 L280,430 L270,430" fill="none" stroke="#c9a84c" stroke-width="2"/>
  <rect x="20" y="425" width="260" height="1" fill="url(#goldBar)" opacity="0.5"/>
  <rect x="20" y="428" width="260" height="2" fill="url(#goldBar)"/>

  <!-- Subtle texture -->
  <rect width="300" height="450" fill="#704214" opacity="0.05" filter="url(#noise2)"/>

  <!-- Tagalog subtitle -->
  <text x="150" y="375" text-anchor="middle" fill="#c9a84c/40" font-family="Georgia, serif" font-size="8" letter-spacing="1">Huwag Mo Akong Salingin</text>
</svg>
